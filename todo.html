<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ma To-Do List</title>
    <style>
        /* Style général */
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f0f4f8;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
            margin: 0;
        }

        .container {
            background: white;
            border-radius: 16px;
            padding: 32px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 24px;
        }

        /* Zone de saisie */
        .input-zone {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
        }

        input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
            outline: none;
        }

        input:focus {
            border-color: #2980b9;
        }
        button {
            padding: 12px 20px;
            background-color: #2980b9;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background-color: #1a6fa0;
        }

        /* Liste des tâches */
        ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        li {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
            background: #f8f9fa;
            border-radius: 10px;
            margin-bottom: 8px;
            transition: all 0.3s;
        }

        li:hover {
            background: #e8f4fd;
        }

        /* Tâche terminée */
        li.termine {
            background: #e8f8e8;
            text-decoration: line-through;
            color: #888;
        }

        .texte-tache {
            flex: 1;
            font-size: 1rem;
        }

        /* Boutons Fait et Supprimer */
        .btn-fait {
            background-color: #27ae60;
            padding: 6px 12px;
            font-size: 0.8rem;
            border-radius: 6px;
        }

        .btn-fait:hover {
            background-color: #1e8449;
        }

        .btn-supprimer {
            background-color: #e74c3c;
            padding: 6px 12px;
            font-size: 0.8rem;
            border-radius: 6px;
        }

        .btn-supprimer:hover {
            background-color: #c0392b;
        }

        /* Compteur */
        .compteur {
            text-align: center;
            color: #888;
            font-size: 0.9rem;
            margin-top: 16px;
        }

        /* Message si liste vide */
        .liste-vide {
            text-align: center;
            color: #bbb;
            font-size: 0.9rem;
            padding: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>📝 Ma To-Do List</h1>

    <!-- Zone de saisie -->
    <div class="input-zone">
        <input 
            type="text" 
            id="inputTache" 
            placeholder="Ajouter une tâche..."
        >
        <button onclick="ajouterTache()">➕ Ajouter</button>
    </div>

    <!-- Liste des tâches -->
    <ul id="listeTaches">
        <li class="liste-vide">Aucune tâche pour l'instant 🎉</li>
    </ul>

    <!-- Compteur -->
    <div class="compteur" id="compteur"></div>
</div>

<script>
    // Tableau qui stocke toutes les tâches
    let taches = [];

    // Fonction pour ajouter une tâche
    function ajouterTache() {
        let input = document.getElementById("inputTache");
        let texte = input.value.trim();

        // Vérifier que le champ n'est pas vide
        if (texte === "") {
            input.placeholder = "⚠️ Écris une tâche d'abord !";
            return;
        }

        // Ajouter la tâche dans le tableau
        taches.push({
            texte: texte,
            termine: false
        });

        // Vider le champ
        input.value = "";
        input.placeholder = "Ajouter une tâche...";

        // Mettre à jour l'affichage
        afficherTaches();
    }

    // Fonction pour marquer une tâche comme terminée
    function toggleTermine(index) {
        taches[index].termine = !taches[index].termine;
        afficherTaches();
    }

    // Fonction pour supprimer une tâche
    function supprimerTache(index) {
        taches.splice(index, 1);
        afficherTaches();
    }

    // Fonction pour afficher toutes les tâches
    function afficherTaches() {
        let liste = document.getElementById("listeTaches");
        let compteur = document.getElementById("compteur");

        // Vider la liste actuelle
        liste.innerHTML = "";

        // Si aucune tâche
        if (taches.length === 0) {
            liste.innerHTML = '<li class="liste-vide">Aucune tâche pour l\'instant 🎉</li>';
            compteur.textContent = "";
            return;
        }

        // Afficher chaque tâche
        taches.forEach(function(tache, index) {
            let li = document.createElement("li");
            if (tache.termine) {
                li.classList.add("termine");
            }

            li.innerHTML = `
                <span class="texte-tache">${tache.texte}</span>
                <button class="btn-fait" onclick="toggleTermine(${index})">
                    ${tache.termine ? "↩️ Reprendre" : "✅ Fait"}
                </button>
                <button class="btn-supprimer" onclick="supprimerTache(${index})">
                    🗑️ Supprimer
                </button>
            `;

            liste.appendChild(li);
        });

        // Mettre à jour le compteur
        let terminees = taches.filter(t => t.termine).length;
        compteur.textContent = `${terminees} / ${taches.length} tâches terminées`;
    }

    // Ajouter une tâche en appuyant sur Entrée
    document.getElementById("inputTache").addEventListener("keypress", function(e) {
        if (e.key === "Enter") {
            ajouterTache();
        }
    });
</script>

</body>
</html>
